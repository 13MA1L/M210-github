name: Deploy Auto-Verwaltung

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: AWS Credentials setzen
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform installieren
        uses: hashicorp/setup-terraform@v3

      - name: Backend ZIP für Terraform erstellen
        run: |
          cd backend
          npm ci
          zip -r ../terraform/backend_code.zip .

      - name: Terraform apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

      - name: Lambda Code aktualisieren
        run: |
          cd backend
          zip -r function.zip .
          aws lambda update-function-code \
            --function-name AutoAPI-ismail \
            --zip-file fileb://function.zip

      - name: Frontend bauen
        run: |
          cd frontend
          npm install
          npm ci
          npm run build

      - name: Frontend nach S3 hochladen
        run: |
          aws s3 sync frontend/dist/ s3://auto-verwaltung-frontend-ismailziberi-2026-002 --delete